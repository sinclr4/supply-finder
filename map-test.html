<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #map { height: 400px; border: 2px solid #333; margin: 20px 0; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Leaflet Map Test</h1>
    <div id="status"></div>
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        const status = document.getElementById('status');
        
        function addStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            status.appendChild(div);
            console.log(message);
        }
        
        addStatus('Page loaded', 'info');
        
        window.addEventListener('load', function() {
            addStatus('Window load event fired', 'info');
            
            if (typeof L === 'undefined') {
                addStatus('❌ Leaflet (L) is NOT defined!', 'error');
                addStatus('Check browser console for errors', 'error');
            } else {
                addStatus('✅ Leaflet (L) is defined!', 'success');
                addStatus(`Leaflet version: ${L.version}`, 'info');
                
                try {
                    const map = L.map('map').setView([54.5, -2], 6);
                    addStatus('✅ Map object created', 'success');
                    
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors',
                        maxZoom: 19
                    }).addTo(map);
                    addStatus('✅ Tiles added successfully', 'success');
                    addStatus('🎉 Map is working perfectly!', 'success');
                    
                } catch (error) {
                    addStatus('❌ Error creating map: ' + error.message, 'error');
                    console.error(error);
                }
            }
        });
    </script>
</body>
</html>
